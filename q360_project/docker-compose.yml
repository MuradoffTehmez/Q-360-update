services:
  # ============================================
  # PostgreSQL 16 Database
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: q360_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-q360_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.utf8 --lc-ctype=en_US.utf8"
      TZ: Asia/Baku
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-q360_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Redis 7 — Broker, Cache, Channel Layer
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: q360_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Django Web Application (Daphne ASGI)
  # ============================================
  web:
    build: .
    container_name: q360_web
    # CMD is set in Dockerfile (daphne ASGI server)
    volumes:
      - ./templates:/app/templates
      - ./apps:/app/apps
      - ./config:/app/config
      - ./static:/app/static
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Celery Worker — Async Task Processing
  # ============================================
  celery:
    build: .
    container_name: q360_celery
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - ./logs:/app/logs
      - ./apps:/app/apps
      - ./config:/app/config
      - ./static:/app/static
      - ./templates:/app/templates
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Celery Beat — Periodic Task Scheduler
  # ============================================
  celery-beat:
    build: .
    container_name: q360_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./logs:/app/logs
      - ./apps:/app/apps
      - ./config:/app/config
      - ./static:/app/static
      - ./templates:/app/templates
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.path.exists('/tmp/celerybeat.pid') or exit(1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Nginx — Reverse Proxy & Static Files
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: q360_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - q360_network

  # ============================================
  # Ngrok — Public Tunnel
  # ============================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: q360_ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks:
      - q360_network
    depends_on:
      - nginx

# ============================================
# Volumes — Persistent Data
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  q360_network:
    driver: bridge
