  /api/audit/logs/:
    get:
      operationId: api_audit_logs_list
      description: API endpoint that allows audit logs to be viewed.
      parameters:
      - in: query
        name: action
        schema:
          type: string
          enum:
          - create
          - delete
          - export
          - import
          - login
          - login_failure
          - logout
          - permission_denied
          - update
          - view
        description: |-
          * `create` - Yaratma
          * `update` - Yenilənmə
          * `delete` - Silinmə
          * `login` - Giriş
          * `logout` - Çıxış
          * `login_failure` - Uğursuz Giriş
          * `export` - İxrac
          * `import` - İdxal
          * `view` - Baxış
          * `permission_denied` - İcazə Rədd Edildi
      - in: query
        name: model_name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: severity
        schema:
          type: string
          title: Şiddət
          enum:
          - critical
          - info
          - warning
        description: |-
          * `info` - Məlumat
          * `warning` - Xəbərdarlıq
          * `critical` - Kritik
      - in: query
        name: threat_level
        schema:
          type: string
          title: Təhlükə Səviyyəsi
          enum:
          - critical
          - high
          - low
          - medium
          - none
        description: |-
          * `none` - Təhlükə yoxdur
          * `low` - Aşağı
          * `medium` - Orta
          * `high` - Yüksək
          * `critical` - Kritik
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
