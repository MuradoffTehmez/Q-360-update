        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - admin
          - employee
          - hr
          - manager
          - superadmin
        description: |-
          * `superadmin` - Super Administrator
          * `admin` - Administrator
          * `hr` - İnsan Resursları
          * `manager` - Menecer
          * `employee` - İşçi
