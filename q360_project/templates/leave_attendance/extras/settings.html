{% extends "base/base.html" %}
{% load i18n %}

{% block title %}{{ title }} — Q360{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{% trans "Şirkət üzrə qlobal məzuniyyət və davamiyyət qaydaları." %}</p>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow border border-gray-200 dark:border-gray-700 p-6">
        <form class="space-y-6">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2">Ümumi Qaydalar</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Maliyyə İlinin Başlanğıc Ayı</label>
                    <select class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                        <option value="1" {% if settings.fiscal_year_start_month == 1 %}selected{% endif %}>Yanvar</option>
                        <option value="4" {% if settings.fiscal_year_start_month == 4 %}selected{% endif %}>Aprel</option>
                        <option value="7" {% if settings.fiscal_year_start_month == 7 %}selected{% endif %}>İyul</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Həftəlik İş Günləri</label>
                    <input type="number" value="{{ settings.working_days_per_week|default:5 }}" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                </div>
            </div>

            <h3 class="text-lg font-bold text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2 mt-8">İş Saatları (Davamiyyət)</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Standart İş Başlama Vaxtı</label>
                    <input type="time" value="{{ settings.default_work_start_time|time:'H:i'|default:'09:00' }}" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Standart İş Bitmə Vaxtı</label>
                    <input type="time" value="{{ settings.default_work_end_time|time:'H:i'|default:'18:00' }}" class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                </div>
            </div>

            <h3 class="text-lg font-bold text-gray-900 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-2 mt-8">Mənfi Qalıq Siyasəti</h3>
            
            <div class="space-y-4">
                <label class="flex items-center">
                    <input type="checkbox" {% if settings.allow_negative_balance %}checked{% endif %} class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50 dark:bg-gray-700 dark:border-gray-600">
                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">İşçilərin məzuniyyət qalığının mənfiyə düşməsinə icazə ver (Avans məzuniyyət)</span>
                </label>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Maksimum Mənfi Qalıq (Gün)</label>
                    <input type="number" value="{{ settings.max_negative_balance|default:0 }}" class="w-full md:w-1/3 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                </div>
            </div>

            <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                <button type="button" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Yadda Saxla</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
