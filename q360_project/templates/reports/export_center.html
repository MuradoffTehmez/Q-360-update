{% extends "base/base.html" %}
{% load i18n %}

{% block title %}{{ title }} — Q360{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{% trans "Sistem məlumatlarının kütləvi şəkildə PDF, Excel və ya CSV formatında endirilməsi." %}</p>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow border border-gray-200 dark:border-gray-700 overflow-hidden">
        <form method="post" class="p-6">
            {% csrf_token %}
            
            <div class="space-y-6">
                <!-- Data Source Selection -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-2">{% trans "Məlumat Növü" %}</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <label class="border border-gray-200 dark:border-gray-600 rounded-lg p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition relative">
                            <input type="radio" name="data_type" value="evaluations" class="peer sr-only" checked>
                            <div class="peer-checked:ring-2 peer-checked:ring-blue-500 absolute inset-0 rounded-lg pointer-events-none"></div>
                            <div class="text-blue-500 mb-2"><i class="fas fa-chart-pie text-2xl"></i></div>
                            <div class="font-medium text-gray-900 dark:text-white text-sm">{% trans "Qiymətləndirmələr" %}</div>
                        </label>
                        
                        <label class="border border-gray-200 dark:border-gray-600 rounded-lg p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition relative">
                            <input type="radio" name="data_type" value="users" class="peer sr-only">
                            <div class="peer-checked:ring-2 peer-checked:ring-blue-500 absolute inset-0 rounded-lg pointer-events-none"></div>
                            <div class="text-green-500 mb-2"><i class="fas fa-users text-2xl"></i></div>
                            <div class="font-medium text-gray-900 dark:text-white text-sm">{% trans "İşçi Məlumatları" %}</div>
                        </label>
                        
                        <label class="border border-gray-200 dark:border-gray-600 rounded-lg p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition relative">
                            <input type="radio" name="data_type" value="departments" class="peer sr-only">
                            <div class="peer-checked:ring-2 peer-checked:ring-blue-500 absolute inset-0 rounded-lg pointer-events-none"></div>
                            <div class="text-purple-500 mb-2"><i class="fas fa-sitemap text-2xl"></i></div>
                            <div class="font-medium text-gray-900 dark:text-white text-sm">{% trans "Struktur" %}</div>
                        </label>
                        
                        <label class="border border-gray-200 dark:border-gray-600 rounded-lg p-4 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition relative">
                            <input type="radio" name="data_type" value="system" class="peer sr-only">
                            <div class="peer-checked:ring-2 peer-checked:ring-blue-500 absolute inset-0 rounded-lg pointer-events-none"></div>
                            <div class="text-orange-500 mb-2"><i class="fas fa-cogs text-2xl"></i></div>
                            <div class="font-medium text-gray-900 dark:text-white text-sm">{% trans "Sistem Loqları" %}</div>
                        </label>
                    </div>
                </div>

                <!-- Export Format -->
                <div>
                    <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-2">{% trans "Format" %}</label>
                    <div class="flex space-x-4">
                        <label class="inline-flex items-center">
                            <input type="radio" name="format" value="excel" class="form-radio text-blue-600 h-4 w-4" checked>
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">Excel (.xlsx)</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="format" value="csv" class="form-radio text-blue-600 h-4 w-4">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">CSV</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="format" value="pdf" class="form-radio text-blue-600 h-4 w-4">
                            <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">PDF Document</span>
                        </label>
                    </div>
                </div>

                <!-- Date Range -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{% trans "Başlanğıc Tarixi" %}</label>
                        <input type="date" name="start_date" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">{% trans "Bitiş Tarixi" %}</label>
                        <input type="date" name="end_date" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <div class="mt-8 flex justify-end">
                <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-lg shadow transition-colors flex items-center">
                    <i class="fas fa-download mr-2"></i>{% trans "Eksporta Başla" %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
